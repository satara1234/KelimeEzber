<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>LexiMem - SRS Kelime Ezberleme</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; overflow-x:hidden; }

        @keyframes slideUp    { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeIn     { from{opacity:0} to{opacity:1} }
        @keyframes popIn      { 0%{transform:scale(.85);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
        @keyframes spin       { from{transform:rotate(0)} to{transform:rotate(360deg)} }
        @keyframes streakPop  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
        @keyframes sheetUp    { from{transform:translateY(100%);opacity:.4} to{transform:translateY(0);opacity:1} }
        @keyframes overlayIn  { from{opacity:0} to{opacity:1} }

        .animate-slide-up { animation:slideUp .35s cubic-bezier(.22,1,.36,1); }
        .animate-fade-in  { animation:fadeIn .25s ease-out; }
        .animate-pop-in   { animation:popIn .4s cubic-bezier(.22,1,.36,1); }
        .animate-spin     { animation:spin .9s linear infinite; display:inline-block; }
        .streak-anim      { animation:streakPop 1.6s ease-in-out infinite; }
        .sheet-enter      { animation:sheetUp .38s cubic-bezier(.22,1,.36,1); }
        .overlay-enter    { animation:overlayIn .25s ease-out; }

        ::-webkit-scrollbar            { width:3px; }
        ::-webkit-scrollbar-track      { background:rgba(0,0,0,.04); border-radius:10px; }
        ::-webkit-scrollbar-thumb      { background:rgba(0,0,0,.15); border-radius:10px; }

        .pb-safe    { padding-bottom:env(safe-area-inset-bottom,0); }
        button:active { transform:scale(.97); }

        /* Level colors */
        .lc1{background:#3b82f6} .lc2{background:#22c55e} .lc3{background:#eab308}
        .lc4{background:#f97316} .lc5{background:#ef4444} .lc6{background:#a855f7}
        .bc1{background:#3b82f6} .bc2{background:#22c55e} .bc3{background:#eab308}
        .bc4{background:#f97316} .bc5{background:#ef4444} .bc6{background:#a855f7}

        .tc1{color:#3b82f6} .tc2{color:#22c55e} .tc3{color:#eab308}
        .tc4{color:#f97316} .tc5{color:#ef4444} .tc6{color:#a855f7}

        /* Stat icon cards */
        .stat-icon-wrap {
            width:44px; height:44px; border-radius:14px;
            display:flex; align-items:center; justify-content:center; margin:0 auto 8px;
        }
        .stat-icon-wrap svg { width:24px; height:24px; }

        /* AI button */
        .ai-btn { background:linear-gradient(135deg,#7c3aed,#db2777); box-shadow:0 4px 15px rgba(124,58,237,.3); }
        .ai-btn:active { transform:scale(.97); }

        /* Quiz options */
        .quiz-idle    { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); color:#374151; }
        .quiz-correct { background:#22c55e; color:#fff; }
        .quiz-wrong   { background:#ef4444; color:#fff; }
        .quiz-dim     { background:#f3f4f6; color:#9ca3af; }

        .card-shadow { box-shadow:0 6px 24px rgba(0,0,0,.09); }
        .card-shadow-lg { box-shadow:0 12px 40px rgba(0,0,0,.14); }

        .quiz-overlay::before {
            content:''; position:fixed; inset:0; pointer-events:none;
            background:radial-gradient(ellipse at top,rgba(255,255,255,.12) 0%,transparent 60%);
        }

        /* Word card tap feedback */
        .word-card {
            cursor:pointer;
            transition:transform .15s ease, box-shadow .15s ease;
            -webkit-user-select:none; user-select:none;
        }
        .word-card:active { transform:scale(.985) !important; box-shadow:0 2px 10px rgba(0,0,0,.08) !important; }

        /* Detail sheet */
        .detail-sheet {
            position:fixed; inset:0; z-index:60;
        }
        .detail-overlay {
            position:absolute; inset:0; background:rgba(0,0,0,.45);
        }
        .detail-panel {
            position:absolute; bottom:0; left:0; right:0;
            background:#fff;
            border-radius:28px 28px 0 0;
            max-height:92vh;
            overflow-y:auto;
        }
        .detail-handle {
            width:40px; height:4px; background:#e5e7eb; border-radius:2px;
            margin:12px auto 0; flex-shrink:0;
        }

        /* Level pill in detail */
        .level-pill {
            display:inline-flex; align-items:center; gap:6px;
            padding:5px 12px; border-radius:999px;
            font-size:12px; font-weight:700; color:#fff;
        }

        /* Progress ring */
        .progress-ring-circle { transition:stroke-dashoffset .5s ease; transform-origin:50% 50%; transform:rotate(-90deg); }

        /* Android-style nav icon active indicator */
        .nav-active-pill {
            position:absolute; bottom:0; left:50%; transform:translateX(-50%);
            width:20px; height:3px; border-radius:2px; background:#3b82f6;
        }

        /* Compact list item */
        .list-item-row {
            display:flex; align-items:center; gap:12px; padding:12px 16px;
            background:#fff; border-radius:16px; cursor:pointer;
            transition:transform .12s ease, box-shadow .12s ease;
        }
        .list-item-row:active { transform:scale(.985); }

        .list-level-dot {
            width:10px; height:10px; border-radius:50%; flex-shrink:0;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

const getDueWords=()=>{
    const now=Date.now(), hr=new Date().getHours();
    return state.words.filter(w=>w.level!==6&&hr>=state.quizStartHour&&hr<=state.quizEndHour&&w.nextReview<=now);
};
const levenshtein=(a,b)=>{
    const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>[i]);
    for(let j=0;j<=n;j++)dp[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
        dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
};
const isFuzzyMatch=(ans,cor)=>{
    const a=ans.toLowerCase().trim(),b=cor.toLowerCase().trim();
    if(a===b)return true;
    const mx=Math.max(a.length,b.length);
    return levenshtein(a,b)<=(mx<=4?0:mx<=7?1:2);
};
const updateWordSRS=(word,ok)=>{
    if(ok){
        const k=word.kademe+1,cfg=LEVEL_CONFIG[word.level];
        if(k>=cfg.requiredStreak){
            const nxt=cfg.nextLevel;
            return nxt===6?{...word,level:6,kademe:0,nextReview:Date.now(),finishTime:Date.now()}
                          :{...word,level:nxt,kademe:0,nextReview:Date.now()+LEVEL_CONFIG[nxt].interval*3600000};
        }
        return{...word,kademe:k,nextReview:Date.now()+cfg.interval*3600000};
    }
    if(word.level===1)return{...word,kademe:0,nextReview:Date.now()+LEVEL_CONFIG[1].interval*3600000};
    const fb=LEVEL_CONFIG[word.level].fallbackLevel;
    return{...word,level:fb,kademe:0,nextReview:Date.now()+LEVEL_CONFIG[fb].interval*3600000};
};
const speakText=(text,lang='en')=>{
    if(!('speechSynthesis'in window)){alert('Seslendirme desteklenmiyor');return;}
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
};
const generateDistractors=(correct)=>{
    const pool=[...state.words.filter(w=>w.id!==correct.id&&w.definition!==correct.definition)]
        .sort(()=>Math.random()-.5).slice(0,4).map(w=>w.definition);
    const pad=['None of these','Farklı anlam','Diğer anlam','Belirsiz'];
    let i=0;while(pool.length<4)pool.push(pad[i++]);
    return pool;
};
const getStreak=()=>{
    if(!state.quizHistory.length)return 0;
    const uniq=[...new Set(state.quizHistory)].sort((a,b)=>new Date(b)-new Date(a));
    const today=new Date().toDateString(),yesterday=new Date(Date.now()-86400000).toDateString();
    if(uniq[0]!==today&&uniq[0]!==yesterday)return 0;
    let s=0,check=new Date(uniq[0]);
    for(const d of uniq){
        if(new Date(d).toDateString()===check.toDateString()){s++;check=new Date(check-86400000);}
        else break;
    }
    return s;
};
const getSortedWords=()=>{
    let arr=[...state.words];
    if(state.searchQuery.trim()){
        const q=state.searchQuery.toLowerCase();
        arr=arr.filter(w=>w.term.toLowerCase().includes(q)||w.definition.toLowerCase().includes(q)||(w.synonyms&&w.synonyms.toLowerCase().includes(q)));
    }
    switch(state.sortType){
        case'newest':  return arr.sort((a,b)=>parseInt(b.id)-parseInt(a.id));
        case'oldest':  return arr.sort((a,b)=>parseInt(a.id)-parseInt(b.id));
        case'levelAsc':return arr.sort((a,b)=>a.level-b.level);
        case'levelDesc':return arr.sort((a,b)=>b.level-a.level);
        default:return arr;
    }
};
const getLevelStats=()=>{const s={};for(let i=1;i<=6;i++)s[i]=state.words.filter(w=>w.level===i).length;return s;};
const fmtDate=ts=>new Date(ts).toLocaleDateString('tr-TR');
const lvlColor=l=>['','lc1','lc2','lc3','lc4','lc5','lc6'][l]||'bg-gray-400';

// AI
// ═══════════════════════════════════════════════
const AI_SYSTEM=`You are a vocabulary learning assistant. Given an English word and its Turkish meaning, respond ONLY with a raw JSON object (no markdown) with:
- "synonyms": comma-separated English synonyms (2-4 words)
- "antonyms": comma-separated antonyms (empty string if none)
- "exampleSentence": one natural English sentence`;

const callAI=async(term,def)=>{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:AI_SYSTEM,
            messages:[{role:"user",content:`Word: ${term}\nTurkish: ${def}`}]})});
    const d=await r.json();
    const txt=d.content?.find(b=>b.type==='text')?.text||'{}';
    return JSON.parse(txt.replace(/```json|```/g,'').trim());
};
const aiGenerateForAdd=async()=>{
    const term=state.newWord.term.trim(),def=state.newWord.definition.trim();
    if(!term||!def){alert('Önce kelime ve anlamını girin!');return;}
    state.aiLoading=true;render();
    try{const r=await callAI(term,def);
        if(r.synonyms!==undefined)state.newWord.synonyms=r.synonyms;
        if(r.antonyms!==undefined)state.newWord.antonyms=r.antonyms;
        if(r.exampleSentence!==undefined)state.newWord.exampleSentence=r.exampleSentence;
    }catch{alert('AI hatası. Tekrar deneyin.');}
    state.aiLoading=false;render();
};
const aiGenerateForEdit=async()=>{
    if(!state.editingWord)return;
    const te=document.getElementById('editTerm'),de=document.getElementById('editDefinition');
    if(te)state.editingWord.term=te.value;if(de)state.editingWord.definition=de.value;
    state.aiLoading=true;render();
    try{const r=await callAI(state.editingWord.term,state.editingWord.definition);
        if(r.synonyms!==undefined)state.editingWord.synonyms=r.synonyms;
        if(r.antonyms!==undefined)state.editingWord.antonyms=r.antonyms;
        if(r.exampleSentence!==undefined)state.editingWord.exampleSentence=r.exampleSentence;
    }catch{alert('AI hatası.');}
    state.aiLoading=false;render();
};

// QUIZ
// ═══════════════════════════════════════════════
const genMC=(list,idx)=>{
    if(idx>=list.length){state.quizType='writing';state.quizIndex=0;genWrite(list,0);return;}
    const w=list[idx];
    state.currentQuestion={word:w,options:[...generateDistractors(w),w.definition].sort(()=>Math.random()-.5),correctAnswer:w.definition,type:'mc'};
    render();
};
const genWrite=(list,idx)=>{
    if(idx>=list.length){finishQuiz();return;}
    state.currentQuestion={word:list[idx],correctAnswer:list[idx].term,type:'write'};
    render();
    setTimeout(()=>{const el=document.getElementById('writingAnswer');if(el)el.focus();},80);
};
const handleMC=(sel)=>{
    if(!state.currentQuestion||state.feedback)return;
    const ok=sel===state.currentQuestion.correctAnswer;
    state.quizStats.mcCorrect+=ok?1:0;state.quizStats.mcTotal++;
    state.feedback={isCorrect:ok,correctAnswer:state.currentQuestion.correctAnswer,selected:sel};
    render();
    setTimeout(()=>{
        state.feedback=null;
        const next=state.quizIndex+1;
        if(next<state.quizWords.length){state.quizIndex=next;genMC(state.quizWords,next);}
        else{state.quizType='writing';state.quizIndex=0;genWrite(state.quizWords,0);}
        render();
    },1300);
};
const handleWrite=()=>{
    if(!state.currentQuestion||state.feedback)return;
    const el=document.getElementById('writingAnswer');
    const ans=el?el.value.trim():'';
    if(!ans){alert('Lütfen bir cevap yazın!');return;}
    const ok=isFuzzyMatch(ans,state.currentQuestion.correctAnswer);
    const fuzzy=ok&&ans.toLowerCase()!==state.currentQuestion.correctAnswer.toLowerCase();
    const updated=updateWordSRS(state.currentQuestion.word,ok);
    const wi=state.words.findIndex(w=>w.id===updated.id);
    if(wi!==-1)state.words[wi]=updated;
    state.quizStats.writeCorrect+=ok?1:0;state.quizStats.writeTotal++;
    state.feedback={isCorrect:ok,correctAnswer:state.currentQuestion.correctAnswer,userAnswer:ans,fuzzy};
    if(state.quizIndex===state.quizWords.length-1){
        const today=new Date().toDateString();
        if(!state.quizHistory.includes(today))state.quizHistory.push(today);
    }
    save();render();
    setTimeout(()=>{
        state.feedback=null;
        const next=state.quizIndex+1;
        if(next<state.quizWords.length){state.quizIndex=next;genWrite(state.quizWords,next);}
        else finishQuiz();
        render();
    },1400);
};
const skipQuestion=()=>{
    if(state.feedback)return;
    const next=state.quizIndex+1;
    if(state.quizType==='multiple-choice'){
        if(next<state.quizWords.length){state.quizIndex=next;genMC(state.quizWords,next);}
        else{state.quizType='writing';state.quizIndex=0;genWrite(state.quizWords,0);}
    }else{
        if(next<state.quizWords.length){state.quizIndex=next;genWrite(state.quizWords,next);}
        else finishQuiz();
    }
};
const startQuiz=()=>{
    const due=getDueWords();
    if(due.length<5){alert(`Sınav için en az 5 kelime gerekli! (Hazır: ${due.length})`);return;}
    state.quizWords=[...due];state.quizIndex=0;state.quizType='multiple-choice';
    state.showQuiz=true;state.quizStats={mcCorrect:0,mcTotal:0,writeCorrect:0,writeTotal:0};
    state.showQuizResults=false;genMC(state.quizWords,0);
};
const finishQuiz=()=>{state.showQuiz=false;state.currentQuestion=null;state.showQuizResults=true;render();};
const closeResults=()=>{state.showQuizResults=false;state.quizWords=[];state.quizIndex=0;state.feedback=null;state.quizType='multiple-choice';render();};

const addWord=()=>{

    if(!term||!def){alert('Kelime ve anlamını girin!');return;}
    state.words.unshift({id:Date.now().toString(),term,definition:def,level:1,kademe:0,
        nextReview:Date.now(),finishTime:null,image:get('newImage'),
        synonyms:get('newSynonyms'),antonyms:get('newAntonyms'),exampleSentence:get('newExample')});
    state.newWord={term:'',definition:'',image:'',synonyms:'',antonyms:'',exampleSentence:''};
    state.showAddForm=false;save();render();
};
const deleteWord=(id)=>{
    if(!confirm('Bu kelimeyi silmek istediğinizden emin misiniz?'))return;
    state.words=state.words.filter(w=>w.id!==id);
    // Close detail sheet if viewing deleted word
    if(state.viewingWord&&state.viewingWord.id===id)state.viewingWord=null;
    save();render();
};
const openEditModal=(word)=>{state.editingWord={...word};state.showEditModal=true;render();};
const saveEdit=()=>{
    if(!state.editingWord)return;
    const get=id=>{const el=document.getElementById(id);return el?el.value:'';};
    Object.assign(state.editingWord,{term:get('editTerm'),definition:get('editDefinition'),
        image:get('editImage'),synonyms:get('editSynonyms'),antonyms:get('editAntonyms'),exampleSentence:get('editExample')});
    const i=state.words.findIndex(w=>w.id===state.editingWord.id);
    if(i!==-1){state.words[i]={...state.editingWord};save();}
    // Update viewing word if open
    if(state.viewingWord&&state.viewingWord.id===state.editingWord.id)
        state.viewingWord={...state.editingWord};
    state.showEditModal=false;state.editingWord=null;render();
};

const exportJSON=()=>{

const exportCSV=()=>{
    const hdr='term,definition,synonyms,antonyms,exampleSentence\n';
    const rows=state.words.map(w=>`"${w.term}","${w.definition}","${w.synonyms||''}","${w.antonyms||''}","${w.exampleSentence||''}"`).join('\n');
    const blob=new Blob([hdr+rows],{type:'text/csv'});
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`leximem_${new Date().toISOString().split('T')[0]}.csv`});
    a.click();URL.revokeObjectURL(a.href);
};
const importFile=(event)=>{
    const file=event.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
        try{
            if(file.name.endsWith('.json')){
                const imp=JSON.parse(e.target.result);
                if(!Array.isArray(imp)){alert('Geçersiz JSON!');return;}
                state.words=imp;
            }else if(file.name.endsWith('.csv')){
                const lines=e.target.result.split('\n').filter(l=>l.trim());
                const start=lines[0].toLowerCase().includes('term')?1:0;
                const nw=[];
                for(let i=start;i<lines.length;i++){
                    const parts=lines[i].match(/("(?:[^"\\]|\\.)*"|[^,]+)(?:,|$)/g)?.map(s=>s.replace(/,$/,'').replace(/^"|"$/g,'').trim())||[];
                    if(parts.length>=2&&parts[0]&&parts[1])nw.push({id:Date.now()+'-'+i,term:parts[0],definition:parts[1],
                        level:1,kademe:0,nextReview:Date.now(),finishTime:null,image:'',
                        synonyms:parts[2]||'',antonyms:parts[3]||'',exampleSentence:parts[4]||''});
                }
                if(!nw.length){alert('CSV\'den kelime okunamadı!');return;}
                const merge=confirm(`${nw.length} kelime bulundu.\nTamam → Ekle  |  İptal → Değiştir`);
                state.words=merge?[...state.words,...nw]:nw;
            }
            save();alert('Yüklendi!');render();
        }catch{alert('Dosya okunamadı!');}
    };
    reader.readAsText(file);
};

// RENDER: LIST TAB  (compact rows, tap-to-expand)

const renderList=()=>{
    const sorted=getSortedWords();
    const active=sorted.filter(w=>w.level!==6),mastered=sorted.filter(w=>w.level===6);

    const wordRow=(w,isMastered=false)=>{
        const m=lvlMeta(w.level);
        return `<div class="list-item-row card-shadow" onclick="window.openWordDetail('${w.id}')">
            <div style="width:36px;height:36px;border-radius:12px;background:${m.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg viewBox="0 0 24 24" fill="${m.fg}" width="18" height="18">${ICONS[m.icon]}</svg>
            </div>
            <div class="flex-1 min-w-0">
                <div class="font-bold text-gray-800 text-sm leading-tight truncate">${w.term}</div>
                <div class="text-xs text-gray-400 truncate">${w.definition}</div>
            </div>
            ${!isMastered?`<div class="text-xs font-semibold flex-shrink-0" style="color:${m.fg}">${w.kademe}/${LEVEL_CONFIG[w.level].requiredStreak}</div>`
                :`<div class="flex-shrink-0"><svg viewBox="0 0 24 24" fill="#a855f7" width="16" height="16"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm-2 14.5l-3.5-3.5 1.41-1.41L10 13.67l6.09-6.08 1.41 1.41L10 16.5z"/></svg></div>`}
            <div class="flex-shrink-0 text-gray-300">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </div>
        </div>`;
    };

    return `<div class="p-4 pb-20 animate-slide-up">
        <div class="flex justify-between items-center mb-3">
            <h2 class="font-bold text-xl text-gray-800">Kelime Listem</h2>
            <div class="relative">
                <select onchange="window.changeSortType(this.value)"
                    class="appearance-none bg-white border border-gray-200 rounded-lg px-3 py-2 pr-7 text-xs focus:outline-none">
                    <option value="newest"    ${state.sortType==='newest'   ?'selected':''}>🆕 Yeni→Eski</option>
                    <option value="oldest"    ${state.sortType==='oldest'   ?'selected':''}>📆 Eski→Yeni</option>
                    <option value="levelAsc"  ${state.sortType==='levelAsc' ?'selected':''}>⬆️ Level ↑</option>
                    <option value="levelDesc" ${state.sortType==='levelDesc'?'selected':''}>⬇️ Level ↓</option>
                </select>
                <div class="pointer-events-none absolute right-2 top-2.5 text-xs text-gray-400">▼</div>
            </div>
        </div>

        <div class="relative mb-3">
            <span class="absolute left-3.5 top-3.5 text-gray-400 text-sm">🔍</span>
            <input type="search" id="searchInput" placeholder="Kelime veya anlam ara..."
                value="${state.searchQuery.replace(/"/g,'&quot;')}" oninput="window.updateSearch(this.value)"
                class="w-full pl-9 pr-9 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm bg-white">
            ${state.searchQuery?`<button onclick="window.clearSearch()" class="absolute right-3 top-3.5 text-gray-400">✕</button>`:''}
        </div>

        <div class="text-xs text-gray-400 mb-3">
            ${state.searchQuery
                ?`<span class="text-blue-500 font-medium">"${state.searchQuery}"</span> → ${sorted.length} sonuç`
                :`${state.words.length} kelime • <span class="text-blue-500">${state.words.filter(w=>w.level!==6).length} aktif</span>`}
        </div>

        <div class="space-y-2">
            ${active.map(w=>wordRow(w)).join('')}
            ${mastered.length>0?`
                <div class="flex items-center gap-2 mt-5 mb-2">
                    <svg viewBox="0 0 24 24" fill="#a855f7" width="16" height="16"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm-2 14.5l-3.5-3.5 1.41-1.41L10 13.67l6.09-6.08 1.41 1.41L10 16.5z"/></svg>
                    <span class="font-bold text-sm text-purple-600">Ezberlenenler (${mastered.length})</span>
                </div>
                ${mastered.map(w=>wordRow(w,true)).join('')}
            `:''}
            ${sorted.length===0?`<div class="text-center py-14 text-gray-400">
                <div class="text-5xl mb-3">${state.searchQuery?'🔍':'📭'}</div>
                <p class="text-sm">${state.searchQuery?'Sonuç bulunamadı':'Henüz kelime eklenmemiş'}</p>
                ${!state.searchQuery?`<button onclick="window.switchTab('add')" class="mt-4 text-blue-500 text-sm underline">Hemen ekle</button>`:''}
            </div>`:''}
        </div>
    </div>`;
};

// RENDER: WORD DETAIL SHEET  ← NEW
// ═══════════════════════════════════════════════
const renderWordDetail=()=>{
    if(!state.viewingWord)return'';
    const w=state.viewingWord,m=lvlMeta(w.level),cfg=LEVEL_CONFIG[w.level];
    const kPct=cfg.requiredStreak>0?Math.round(w.kademe/cfg.requiredStreak*100):100;
    // Circle progress
    const r=18,circ=2*Math.PI*r,dash=circ*(kPct/100),gap=circ-dash;

    return`<div class="detail-sheet">
        <div class="detail-overlay overlay-enter" onclick="window.closeWordDetail()"></div>
        <div class="detail-panel sheet-enter">
            <div class="detail-handle"></div>

            <!-- Image hero or color header -->
            ${w.image?`
                <div style="position:relative;height:200px;margin:12px 12px 0;border-radius:20px;overflow:hidden">
                    <img src="${w.image}" alt="${w.term}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'">
                    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.5),transparent)"></div>
                    <div style="position:absolute;bottom:12px;left:16px;right:16px">
                        <div style="font-size:26px;font-weight:900;color:#fff;line-height:1.1">${w.term}</div>
                        <div style="font-size:14px;color:rgba(255,255,255,.8);margin-top:2px">${w.definition}</div>
                    </div>
                </div>`
            :`<div style="margin:12px 12px 0;padding:24px 20px 20px;border-radius:20px;background:${m.bg}">
                <div style="display:flex;align-items:center;gap:12px">
                    <div style="width:52px;height:52px;border-radius:16px;background:${m.fg}20;display:flex;align-items:center;justify-content:center">
                        <svg viewBox="0 0 24 24" fill="${m.fg}" width="26" height="26">${ICONS[m.icon]}</svg>
                    </div>
                    <div>
                        <div style="font-size:26px;font-weight:900;color:#1e293b;line-height:1.1">${w.term}</div>
                        <div style="font-size:14px;color:#64748b;margin-top:2px">${w.definition}</div>
                    </div>
                </div>
            </div>`}

            <div class="p-4 space-y-3">

                <!-- Action buttons row -->
                <div class="flex gap-2">
                    <button onclick="window.speakText('${w.term.replace(/'/g,"\\'")}','en')"
                        class="flex-1 py-2.5 rounded-xl flex items-center justify-center gap-1.5 text-sm font-semibold"
                        style="background:#eff6ff;color:#3b82f6">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">${ICONS.speak}</svg>Dinle
                    </button>
                    <button onclick="window.openEditModal(${JSON.stringify(w).replace(/"/g,'&quot;')})"
                        class="flex-1 py-2.5 rounded-xl flex items-center justify-center gap-1.5 text-sm font-semibold"
                        style="background:#f0fdf4;color:#22c55e">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">${ICONS.edit}</svg>Düzenle
                    </button>
                    <button onclick="window.deleteWord('${w.id}')"
                        class="flex-1 py-2.5 rounded-xl flex items-center justify-center gap-1.5 text-sm font-semibold"
                        style="background:#fef2f2;color:#ef4444">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">${ICONS.trash}</svg>Sil
                    </button>
                </div>

                <!-- SRS Progress card -->
                <div class="bg-white rounded-2xl card-shadow p-4 flex items-center gap-4">
                    <!-- Progress ring -->
                    <svg width="50" height="50" viewBox="0 0 50 50">
                        <circle cx="25" cy="25" r="${r}" fill="none" stroke="#f1f5f9" stroke-width="5"/>
                        <circle cx="25" cy="25" r="${r}" fill="none" stroke="${m.fg}" stroke-width="5"
                            stroke-linecap="round"
                            stroke-dasharray="${dash} ${gap}"
                            class="progress-ring-circle"/>
                        <text x="25" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="${m.fg}">${kPct}%</text>
                    </svg>
                    <div class="flex-1">
                        <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:${m.fg};color:#fff;font-size:11px;font-weight:700;margin-bottom:6px">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11">${ICONS[m.icon]}</svg>
                            ${m.name}
                        </div>
                        <div style="font-size:12px;color:#64748b">
                            Kademe <strong>${w.kademe}</strong> / ${cfg.requiredStreak}
                            ${w.level<6?` • <strong>${cfg.interval}sa</strong> aralık`:''}
                        </div>
                        <div style="font-size:11px;color:#94a3b8;margin-top:2px">
                            ${w.level<6?`Sonraki: ${fmtDate(w.nextReview)}`:`🎉 ${fmtDate(w.finishTime)}`}
                        </div>
                    </div>
                </div>

                <!-- Info pills -->
                ${[
                    w.synonyms&&{icon:'synonym',color:'#10b981',bg:'#f0fdf4',label:'Eş anlamlı',text:w.synonyms},
                    w.antonyms&&{icon:'antonym',color:'#ef4444',bg:'#fef2f2',label:'Zıt anlamlı',text:w.antonyms},
                    w.exampleSentence&&{icon:'quote',color:'#3b82f6',bg:'#eff6ff',label:'Örnek cümle',text:w.exampleSentence},
                ].filter(Boolean).map(item=>`
                    <div class="bg-white rounded-2xl card-shadow p-4">
                        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
                            <div style="width:24px;height:24px;border-radius:8px;background:${item.bg};display:flex;align-items:center;justify-content:center">
                                <svg viewBox="0 0 24 24" fill="${item.color}" width="14" height="14">${ICONS[item.icon]}</svg>
                            </div>
                            <span style="font-size:11px;font-weight:700;color:${item.color};text-transform:uppercase;letter-spacing:.5px">${item.label}</span>
                        </div>
                        <p style="font-size:14px;color:#334155;line-height:1.5">${item.text}</p>
                    </div>`).join('')}

            </div>
            <div class="pb-safe pb-6"></div>
        </div>
    </div>`;
};

                    class="w-full px-4 py-3 border border-gray-200 rounded-xl mb-5 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none">${w.exampleSentence||''}</textarea>
                <div class="flex gap-3">
                    <button onclick="window.saveEdit()"
                        class="flex-1 text-white py-3.5 rounded-xl font-bold active:scale-95"
                        style="background:linear-gradient(135deg,#10b981,#3b82f6)">
                        <svg viewBox="0 0 24 24" fill="white" width="14" height="14" style="display:inline;margin-right:4px">${ICONS.save}</svg>Kaydet
                    </button>
                    <button onclick="window.closeEditModal()" class="flex-1 bg-gray-100 text-gray-600 py-3.5 rounded-xl font-bold active:scale-95">İptal</button>
                </div>
            </div>
        </div>
    </div>`;
};

// ═══════════════════════════════════════════════
// RENDER: QUIZ
// ═══════════════════════════════════════════════
const renderQuiz=()=>{
    if(!state.currentQuestion)return'<div class="flex items-center justify-center h-screen text-gray-400">Yükleniyor...</div>';
    const q=state.currentQuestion,bg=state.backgroundColor;
    const pct=Math.round(((state.quizIndex+1)/state.quizWords.length)*100);
    const isMC=state.quizType==='multiple-choice';
    const header=`<div class="bg-white/15 backdrop-blur-md sticky top-0 z-10 px-4 pt-4 pb-3">
        <div class="flex justify-between items-center mb-2.5">
            <button onclick="window.finishQuiz()" class="text-white font-semibold text-sm">✕ Çıkış</button>
            <div class="text-white text-xs font-semibold opacity-90">${isMC?'🔘 Çoktan Seçmeli':'✍️ Yazılı'} • ${state.quizIndex+1}/${state.quizWords.length}</div>
            <button onclick="window.skipQuestion()" class="text-white/70 text-xs font-medium">Atla ⏭️</button>
        </div>
        <div class="w-full bg-white/25 rounded-full h-1.5">
            <div class="bg-white h-1.5 rounded-full transition-all" style="width:${pct}%"></div>
        </div>
    </div>`;

    if(isMC)return`<div class="min-h-screen bg-gradient-to-br ${bg} quiz-overlay">
        <div class="container mx-auto max-w-md min-h-screen flex flex-col">${header}
            <div class="flex-1 flex items-center justify-center p-5"><div class="w-full">
                <div class="bg-white rounded-3xl card-shadow p-7 mb-5 text-center">
                    ${q.word.image?`<img src="${q.word.image}" class="w-28 h-28 object-cover rounded-2xl mx-auto mb-4" onerror="this.style.display='none'">`:''}
                    <div class="flex items-center justify-center gap-2 mb-3">
                        <span class="text-xs text-gray-400 px-2 py-0.5 bg-gray-100 rounded-full">${LEVEL_CONFIG[q.word.level].name} • ${q.word.kademe}/${LEVEL_CONFIG[q.word.level].requiredStreak}</span>
                        <button onclick="window.speakText('${q.word.term.replace(/'/g,"\\'")}','en')" class="text-blue-400 text-lg">🔊</button>
                    </div>
                    <div class="text-4xl font-bold text-gray-800 break-words leading-tight">${q.word.term}</div>
                    <div class="text-xs text-gray-400 mt-3">Doğru anlamı nedir?</div>
                </div>
                <div class="space-y-2.5">
                    ${q.options.map(opt=>{
                        let cls='quiz-idle';
                        if(state.feedback){if(opt===q.correctAnswer)cls='quiz-correct';else if(opt===state.feedback.selected)cls='quiz-wrong';else cls='quiz-dim';}
                        return`<button onclick="window.handleMC('${opt.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')"
                            class="w-full p-4 rounded-2xl text-left font-medium text-sm transition-all ${cls}" ${state.feedback?'disabled':''}>${opt}</button>`;
                    }).join('')}
                </div>
                ${state.feedback?`<div class="mt-4 p-3.5 rounded-2xl text-center font-bold text-sm animate-fade-in ${state.feedback.isCorrect?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">
                    ${state.feedback.isCorrect?'✓ Doğru!':'✗ Yanlış! Doğrusu: '+state.feedback.correctAnswer}</div>`:''}
            </div></div>
        </div></div>`;

    return`<div class="min-h-screen bg-gradient-to-br ${bg} quiz-overlay">
        <div class="container mx-auto max-w-md min-h-screen flex flex-col">${header}
            <div class="flex-1 flex items-center justify-center p-5"><div class="w-full">
                <div class="bg-white rounded-3xl card-shadow p-7 mb-5 text-center">
                    ${q.word.image?`<img src="${q.word.image}" class="w-28 h-28 object-cover rounded-2xl mx-auto mb-4" onerror="this.style.display='none'">`:''}
                    <div class="text-xs text-gray-400 mb-3 px-2 py-0.5 bg-gray-100 rounded-full inline-block">${LEVEL_CONFIG[q.word.level].name} • ${q.word.kademe}/${LEVEL_CONFIG[q.word.level].requiredStreak}</div>
                    <div class="text-3xl font-bold text-gray-800 mb-2">${q.word.definition}</div>
                    <div class="text-xs text-gray-400 mb-4">İngilizcesini yazın</div>
                    <input type="text" id="writingAnswer" placeholder="Cevabınızı yazın..."
                        class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-2xl focus:outline-none focus:border-blue-400 text-center text-lg"
                        onkeypress="if(event.key==='Enter') window.handleWrite()" ${state.feedback?'disabled':''}>
                </div>
                <button onclick="window.handleWrite()"
                    class="w-full text-white py-4 rounded-2xl font-bold text-base active:scale-95 card-shadow"
                    style="background:linear-gradient(135deg,#3b82f6,#7c3aed)" ${state.feedback?'disabled':''}>Cevapla</button>
                ${state.feedback?`<div class="mt-4 p-4 rounded-2xl text-center font-bold text-sm animate-fade-in ${state.feedback.isCorrect?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">
                    ${state.feedback.isCorrect?(state.feedback.fuzzy?'✨ Yakın — Doğru sayıldı!':'✓ Doğru!'):`✗ Yanlış! Doğrusu: <u>${state.feedback.correctAnswer}</u>`}
                </div>`:''}
            </div></div>
        </div></div>`;
};

// ═══════════════════════════════════════════════
// RENDER: QUIZ RESULTS
// ═══════════════════════════════════════════════
const renderResults=()=>{
    if(!state.showQuizResults)return'';
    const{mcCorrect,mcTotal,writeCorrect,writeTotal}=state.quizStats;
    const tot=mcTotal+writeTotal,cor=mcCorrect+writeCorrect;
    const pct=tot>0?Math.round(cor/tot*100):0;
    const[emoji,msg]=pct>=90?['🏆','Mükemmel!']:pct>=70?['🎉','Harika!']:pct>=50?['💪','Fena değil!']:['📖','Daha fazla pratik!'];
    return`<div class="fixed inset-0 flex items-center justify-center z-50 p-5" style="background:linear-gradient(135deg,#3b82f6,#7c3aed)">
        <div class="bg-white rounded-3xl card-shadow-lg max-w-sm w-full p-8 text-center animate-pop-in">
            <div class="text-6xl mb-3">${emoji}</div>
            <h2 class="text-2xl font-bold text-gray-800">Sınav Bitti!</h2>
            <p class="text-gray-400 text-sm mt-1 mb-6">${msg}</p>
            <div class="text-6xl font-black mb-1 ${pct>=70?'text-emerald-500':'text-orange-500'}">${pct}%</div>
            <div class="text-gray-400 text-sm mb-7">${cor} / ${tot} doğru</div>
            <div class="grid grid-cols-2 gap-3 mb-7">
                <div class="rounded-2xl p-4" style="background:#eff6ff">
                    <div class="text-xs text-gray-400 mb-1">🔘 Çoktan Seçmeli</div>
                    <div class="text-2xl font-bold text-blue-600">${mcCorrect}<span class="text-sm font-normal text-gray-400">/${mcTotal}</span></div>
                    <div class="text-xs text-blue-400">${mcTotal>0?Math.round(mcCorrect/mcTotal*100):0}%</div>
                </div>
                <div class="rounded-2xl p-4" style="background:#faf5ff">
                    <div class="text-xs text-gray-400 mb-1">✍️ Yazılı</div>
                    <div class="text-2xl font-bold text-violet-600">${writeCorrect}<span class="text-sm font-normal text-gray-400">/${writeTotal}</span></div>
                    <div class="text-xs text-violet-400">${writeTotal>0?Math.round(writeCorrect/writeTotal*100):0}%</div>
                </div>
            </div>
            <button onclick="window.closeResults()"
                class="w-full text-white py-4 rounded-2xl font-bold active:scale-95"
                style="background:linear-gradient(135deg,#3b82f6,#7c3aed)">Ana Sayfaya Dön</button>
        </div></div>`;
};

// ═══════════════════════════════════════════════
// RENDER: MAIN  (Android-style nav bar)
// ═══════════════════════════════════════════════
const renderMain=()=>{
    if(state.showQuizResults)return renderResults();
    if(state.showQuiz)return renderQuiz();

    const tabs=[
        {id:'home',    key:'home',    label:'Ana Sayfa'},
        {id:'add',     key:'plus',    label:'Ekle'},
        {id:'list',    key:'list',    label:'Listem'},
        {id:'settings',key:'settings',label:'Ayarlar'},
    ];
    const content={home:renderHome,add:renderAdd,list:renderList,settings:renderSettings}[state.activeTab]||renderHome;

    return`<div class="min-h-screen bg-gradient-to-br ${state.backgroundColor} pb-16">
        <div class="container mx-auto max-w-md">${content()}</div>
        <nav class="fixed bottom-0 left-0 right-0 bg-white/92 backdrop-blur-md border-t border-gray-100 pb-safe" style="box-shadow:0 -2px 20px rgba(0,0,0,.06)">
            <div class="container mx-auto max-w-md">
                <div class="flex justify-around pt-2 pb-1">
                    ${tabs.map(t=>{
                        const active=state.activeTab===t.id;
                        return`<button onclick="window.switchTab('${t.id}')"
                            style="position:relative;display:flex;flex-direction:column;align-items:center;padding:6px 20px 4px;border-radius:12px;transition:all .15s ease;color:${active?'#3b82f6':'#9ca3af'}">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">${ICONS[t.key]}</svg>
                            <span style="font-size:10px;margin-top:3px;font-weight:${active?700:500}">${t.label}</span>
                            ${active?`<div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#3b82f6;border-radius:2px 2px 0 0"></div>`:''}
                        </button>`;
                    }).join('')}
                </div>
            </div>
        </nav>
    </div>`;
};

// ═══════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════
window.startQuiz     = startQuiz;
window.finishQuiz    = ()=>{state.showQuiz=false;state.currentQuestion=null;closeResults();};
window.skipQuestion  = skipQuestion;
window.closeResults  = closeResults;
window.handleMC      = handleMC;
window.handleWrite   = handleWrite;
window.switchTab     = t=>{state.activeTab=t;render();};
window.toggleAddForm = v=>{state.showAddForm=v;render();};
window.addWord       = addWord;
window.deleteWord    = deleteWord;
window.openEditModal = openEditModal;
window.closeEditModal= closeEditModal;
window.saveEdit      = saveEdit;
window.openWordDetail= openWordDetail;
window.closeWordDetail=closeWordDetail;
window.exportJSON    = exportJSON;
window.exportCSV     = exportCSV;
window.importFile    = el=>importFile({target:el});
window.setBackground = c=>{state.backgroundColor=c;save();render();};
window.changeSortType= t=>{state.sortType=t;render();};
window.speakText     = speakText;
window.aiGenerateForAdd  = aiGenerateForAdd;
window.aiGenerateForEdit = aiGenerateForEdit;
window.saveHours     = ()=>{
    const s=parseInt(document.getElementById('startHour').value);
    const e=parseInt(document.getElementById('endHour').value);
    if(isNaN(s)||isNaN(e)||s<0||s>23||e<0||e>23){alert('Geçerli saat girin (0-23)');return;}
    state.quizStartHour=s;state.quizEndHour=e;save();alert('Kaydedildi!');render();
};
window.updateSearch  = v=>{
    state.searchQuery=v;render();
    setTimeout(()=>{const el=document.getElementById('searchInput');if(el){el.focus();el.selectionStart=el.selectionEnd=v.length;}},20);
};
window.clearSearch   = ()=>{state.searchQuery='';render();};

// ═══════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════
const render=()=>{
    document.getElementById('app').innerHTML=renderMain()+renderEditModal()+renderWordDetail();
};

load();render();
</script>
</body>
</html>
