<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SRS Kelime Ezberleme - Gelişmiş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        .animate-bounce {
            animation: bounce 0.5s ease-in-out;
        }

        .animate-pulse {
            animation: pulse 1s ease-in-out infinite;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        button:active {
            transform: scale(0.98);
        }

        .calendar-day {
            transition: all 0.2s ease;
        }

        .calendar-day:hover {
            transform: scale(1.05);
        }

        .image-preview {
            max-height: 150px;
            object-fit: cover;
        }

        .speak-btn {
            transition: all 0.2s ease;
        }

        .speak-btn:active {
            transform: scale(0.9);
        }

        .edit-modal {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="app"></div>

    <script>
        // Level Configuration
        const LEVEL_CONFIG = {
            1: { interval: 24, requiredStreak: 5, nextLevel: 2, fallbackLevel: 1, name: 'Başlangıç', color: 'blue' },
            2: { interval: 48, requiredStreak: 3, nextLevel: 3, fallbackLevel: 1, name: 'Orta Başlangıç', color: 'green' },
            3: { interval: 120, requiredStreak: 3, nextLevel: 4, fallbackLevel: 2, name: 'Orta', color: 'yellow' },
            4: { interval: 240, requiredStreak: 2, nextLevel: 5, fallbackLevel: 3, name: 'İleri', color: 'orange' },
            5: { interval: 360, requiredStreak: 2, nextLevel: 6, fallbackLevel: 4, name: 'Uzman', color: 'red' },
            6: { interval: 0, requiredStreak: 0, nextLevel: 6, fallbackLevel: 5, name: 'Ezberlendi', color: 'purple' }
        };

        // Initial demo words with extended properties
        const INITIAL_WORDS = [
            { 
                id: '1', term: 'Apple', definition: 'Elma', level: 1, kademe: 0, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=150', synonyms: 'Elma', antonyms: '', exampleSentence: 'I eat an apple every day.'
            },
            { 
                id: '2', term: 'Car', definition: 'Araba', level: 2, kademe: 1, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=150', synonyms: 'Vehicle, Automobile', antonyms: '', exampleSentence: 'My car is red.'
            },
            { 
                id: '3', term: 'Beautiful', definition: 'Güzel', level: 3, kademe: 2, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=150', synonyms: 'Pretty, Lovely, Attractive', antonyms: 'Ugly', exampleSentence: 'The sunset is beautiful.'
            },
            { 
                id: '4', term: 'Fast', definition: 'Hızlı', level: 1, kademe: 2, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=150', synonyms: 'Quick, Rapid, Swift', antonyms: 'Slow', exampleSentence: 'He runs very fast.'
            },
            { 
                id: '5', term: 'Computer', definition: 'Bilgisayar', level: 2, kademe: 0, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=150', synonyms: 'PC, Laptop', antonyms: '', exampleSentence: 'I work on my computer.'
            }
        ];

        // App State
        let state = {
            words: [],
            activeTab: 'home',
            showQuiz: false,
            quizType: 'multiple-choice', // multiple-choice or writing
            currentQuestion: null,
            quizWords: [],
            quizIndex: 0,
            feedback: null,
            backgroundColor: 'from-gray-50 to-gray-100',
            quizStartHour: 0,
            quizEndHour: 23,
            showAddForm: false,
            showEditModal: false,
            editingWord: null,
            newWord: {
                term: '',
                definition: '',
                image: '',
                synonyms: '',
                antonyms: '',
                exampleSentence: ''
            },
            sortType: 'newest',
            quizHistory: [],
            writingAnswer: ''
        };

        // Helper Functions
        const saveToLocalStorage = () => {
            localStorage.setItem('srs_words', JSON.stringify(state.words));
            localStorage.setItem('bg_color', state.backgroundColor);
            localStorage.setItem('quiz_start_hour', state.quizStartHour);
            localStorage.setItem('quiz_end_hour', state.quizEndHour);
            localStorage.setItem('quiz_history', JSON.stringify(state.quizHistory));
        };

        const loadFromLocalStorage = () => {
            const savedWords = localStorage.getItem('srs_words');
            state.words = savedWords ? JSON.parse(savedWords) : JSON.parse(JSON.stringify(INITIAL_WORDS));
            state.backgroundColor = localStorage.getItem('bg_color') || 'from-gray-50 to-gray-100';
            state.quizStartHour = parseInt(localStorage.getItem('quiz_start_hour')) || 0;
            state.quizEndHour = parseInt(localStorage.getItem('quiz_end_hour')) || 23;
            const savedHistory = localStorage.getItem('quiz_history');
            state.quizHistory = savedHistory ? JSON.parse(savedHistory) : [];
        };

        const getDueWords = () => {
            const now = Date.now();
            const currentHour = new Date().getHours();
            return state.words.filter(word => {
                if (word.level === 6) return false;
                const isInTimeRange = currentHour >= state.quizStartHour && currentHour <= state.quizEndHour;
                if (!isInTimeRange) return false;
                return word.nextReview <= now;
            });
        };

        const updateWordAfterAnswer = (word, isCorrect) => {
            if (isCorrect) {
                const newKademe = word.kademe + 1;
                const config = LEVEL_CONFIG[word.level];
                
                if (newKademe >= config.requiredStreak) {
                    const nextLevel = config.nextLevel;
                    if (nextLevel === 6) {
                        return {
                            ...word,
                            level: 6,
                            kademe: 0,
                            nextReview: Date.now(),
                            finishTime: Date.now()
                        };
                    } else {
                        return {
                            ...word,
                            level: nextLevel,
                            kademe: 0,
                            nextReview: Date.now() + (LEVEL_CONFIG[nextLevel].interval * 60 * 60 * 1000)
                        };
                    }
                } else {
                    return {
                        ...word,
                        kademe: newKademe,
                        nextReview: Date.now() + (config.interval * 60 * 60 * 1000)
                    };
                }
            } else {
                if (word.level === 1) {
                    return {
                        ...word,
                        kademe: 0,
                        nextReview: Date.now() + (LEVEL_CONFIG[1].interval * 60 * 60 * 1000)
                    };
                } else {
                    const fallbackLevel = LEVEL_CONFIG[word.level].fallbackLevel;
                    return {
                        ...word,
                        level: fallbackLevel,
                        kademe: 0,
                        nextReview: Date.now() + (LEVEL_CONFIG[fallbackLevel].interval * 60 * 60 * 1000)
                    };
                }
            }
        };

        const speakText = (text, lang = 'en') => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.9;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            } else {
                alert('Seslendirme desteklenmiyor');
            }
        };

        const generateDistractors = (correctWord) => {
            const otherWords = state.words.filter(w => 
                w.id !== correctWord.id && 
                w.definition !== correctWord.definition &&
                w.level !== 6
            );
            
            const shuffled = [...otherWords].sort(() => Math.random() - 0.5);
            const distractors = shuffled.slice(0, 4).map(w => w.definition);
            
            while (distractors.length < 4) {
                distractors.push(`Anlam ${distractors.length + 1}`);
            }
            
            return distractors;
        };

        const generateQuestion = (wordsList, index) => {
            if (index >= wordsList.length) {
                // Move to writing quiz after multiple choice
                if (state.quizType === 'multiple-choice') {
                    state.quizType = 'writing';
                    state.quizIndex = 0;
                    generateWritingQuestion(wordsList, 0);
                } else {
                    finishQuiz();
                }
                return;
            }
            
            const currentWord = wordsList[index];
            const distractors = generateDistractors(currentWord);
            const options = [...distractors, currentWord.definition];
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            
            state.currentQuestion = {
                word: currentWord,
                options: shuffledOptions,
                correctAnswer: currentWord.definition,
                type: 'multiple-choice'
            };
            render();
        };

        const generateWritingQuestion = (wordsList, index) => {
            if (index >= wordsList.length) {
                finishQuiz();
                return;
            }
            
            const currentWord = wordsList[index];
            state.currentQuestion = {
                word: currentWord,
                correctAnswer: currentWord.term,
                type: 'writing'
            };
            state.writingAnswer = '';
            render();
        };

        const handleMultipleChoiceAnswer = (selectedAnswer) => {
            if (!state.currentQuestion) return;
            
            const isCorrect = selectedAnswer === state.currentQuestion.correctAnswer;
            
            state.feedback = {
                isCorrect,
                correctAnswer: state.currentQuestion.correctAnswer
            };
            
            const updatedWord = updateWordAfterAnswer(state.currentQuestion.word, isCorrect);
            const wordIndex = state.words.findIndex(w => w.id === updatedWord.id);
            if (wordIndex !== -1) {
                state.words[wordIndex] = updatedWord;
            }
            
            saveToLocalStorage();
            
            setTimeout(() => {
                state.feedback = null;
                const nextIndex = state.quizIndex + 1;
                if (nextIndex < state.quizWords.length) {
                    state.quizIndex = nextIndex;
                    generateQuestion(state.quizWords, nextIndex);
                } else {
                    if (state.quizType === 'multiple-choice') {
                        state.quizType = 'writing';
                        state.quizIndex = 0;
                        generateWritingQuestion(state.quizWords, 0);
                    } else {
                        finishQuiz();
                    }
                }
                render();
            }, 1500);
            
            render();
        };

        const handleWritingAnswer = () => {
            if (!state.currentQuestion || !state.writingAnswer.trim()) {
                alert('Lütfen bir cevap yazın!');
                return;
            }
            
            const isCorrect = state.writingAnswer.trim().toLowerCase() === state.currentQuestion.correctAnswer.toLowerCase();
            
            state.feedback = {
                isCorrect,
                correctAnswer: state.currentQuestion.correctAnswer
            };
            
            const updatedWord = updateWordAfterAnswer(state.currentQuestion.word, isCorrect);
            const wordIndex = state.words.findIndex(w => w.id === updatedWord.id);
            if (wordIndex !== -1) {
                state.words[wordIndex] = updatedWord;
            }
            
            // Record quiz history on last question
            if (state.quizIndex === state.quizWords.length - 1 && state.quizType === 'writing') {
                const today = new Date().toDateString();
                if (!state.quizHistory.includes(today)) {
                    state.quizHistory.push(today);
                    saveToLocalStorage();
                }
            }
            
            saveToLocalStorage();
            
            setTimeout(() => {
                state.feedback = null;
                const nextIndex = state.quizIndex + 1;
                if (nextIndex < state.quizWords.length) {
                    state.quizIndex = nextIndex;
                    generateWritingQuestion(state.quizWords, nextIndex);
                } else {
                    finishQuiz();
                }
                render();
            }, 1500);
            
            render();
        };

        const startQuiz = () => {
            const due = getDueWords();
            if (due.length < 5) {
                alert('Sınav başlatmak için en az 5 kelimeye ihtiyacınız var!');
                return;
            }
            
            state.quizWords = [...due];
            state.quizIndex = 0;
            state.quizType = 'multiple-choice';
            state.showQuiz = true;
            generateQuestion(state.quizWords, 0);
        };

        const finishQuiz = () => {
            state.showQuiz = false;
            state.currentQuestion = null;
            state.quizWords = [];
            state.quizIndex = 0;
            state.feedback = null;
            state.quizType = 'multiple-choice';
            state.writingAnswer = '';
            render();
        };

        const addWord = () => {
            if (!state.newWord.term.trim() || !state.newWord.definition.trim()) {
                alert('Lütfen kelime ve anlamını girin!');
                return;
            }
            
            const newWord = {
                id: Date.now().toString(),
                term: state.newWord.term.trim(),
                definition: state.newWord.definition.trim(),
                level: 1,
                kademe: 0,
                nextReview: Date.now(),
                finishTime: null,
                image: state.newWord.image.trim(),
                synonyms: state.newWord.synonyms.trim(),
                antonyms: state.newWord.antonyms.trim(),
                exampleSentence: state.newWord.exampleSentence.trim()
            };
            
            state.words.unshift(newWord);
            state.newWord = {
                term: '',
                definition: '',
                image: '',
                synonyms: '',
                antonyms: '',
                exampleSentence: ''
            };
            state.showAddForm = false;
            saveToLocalStorage();
            render();
        };

        const updateWord = () => {
            if (!state.editingWord) return;
            
            const index = state.words.findIndex(w => w.id === state.editingWord.id);
            if (index !== -1) {
                state.words[index] = { ...state.editingWord };
                saveToLocalStorage();
            }
            
            state.showEditModal = false;
            state.editingWord = null;
            render();
        };

        const deleteWord = (id) => {
            if (confirm('Bu kelimeyi silmek istediğinizden emin misiniz?')) {
                state.words = state.words.filter(w => w.id !== id);
                saveToLocalStorage();
                render();
            }
        };

        const openEditModal = (word) => {
            state.editingWord = { ...word };
            state.showEditModal = true;
            render();
        };

        const exportData = () => {
            const dataStr = JSON.stringify(state.words, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `srs_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        };

        const importData = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (Array.isArray(imported)) {
                            state.words = imported;
                            saveToLocalStorage();
                            alert('Veriler başarıyla yüklendi!');
                            render();
                        } else {
                            alert('Geçersiz dosya formatı!');
                        }
                    } catch (err) {
                        alert('Dosya okunamadı!');
                    }
                };
                reader.readAsText(file);
            }
        };

        const getSortedWords = () => {
            const wordsToSort = [...state.words];
            switch(state.sortType) {
                case 'newest':
                    return wordsToSort.sort((a, b) => parseInt(b.id) - parseInt(a.id));
                case 'oldest':
                    return wordsToSort.sort((a, b) => parseInt(a.id) - parseInt(b.id));
                case 'levelAsc':
                    return wordsToSort.sort((a, b) => a.level - b.level);
                case 'levelDesc':
                    return wordsToSort.sort((a, b) => b.level - a.level);
                default:
                    return wordsToSort;
            }
        };

        const getLevelStats = () => {
            const stats = {};
            for (let i = 1; i <= 6; i++) {
                stats[i] = state.words.filter(w => w.level === i).length;
            }
            return stats;
        };

        const getNextReviewDate = (timestamp) => {
            return new Date(timestamp).toLocaleDateString('tr-TR');
        };

        const getLevelColor = (level) => {
            const colors = {
                1: 'bg-blue-500',
                2: 'bg-green-500',
                3: 'bg-yellow-500',
                4: 'bg-orange-500',
                5: 'bg-red-500',
                6: 'bg-purple-500'
            };
            return colors[level] || 'bg-gray-500';
        };

        const renderCalendar = () => {
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();
            const firstDayOfMonth = new Date(currentYear, currentMonth, 1);
            const lastDayOfMonth = new Date(currentYear, currentMonth + 1, 0);
            const daysInMonth = lastDayOfMonth.getDate();
            const startDayOfWeek = firstDayOfMonth.getDay();
            
            const calendarDays = [];
            const quizDates = new Set(state.quizHistory);
            
            const adjustedStartDay = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
            
            for (let i = 0; i < adjustedStartDay; i++) {
                calendarDays.push(null);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const dateString = date.toDateString();
                const hasQuiz = quizDates.has(dateString);
                const isToday = date.toDateString() === today.toDateString();
                calendarDays.push({ day, hasQuiz, isToday });
            }
            
            const monthNames = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            const dayNames = ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
            
            return `
                <div class="bg-white rounded-xl shadow-lg p-4">
                    <h3 class="font-bold text-lg mb-4 text-center">📅 ${monthNames[currentMonth]} ${currentYear}</h3>
                    <div class="grid grid-cols-7 gap-1 mb-2">
                        ${dayNames.map(day => `<div class="text-center text-xs font-semibold text-gray-500 py-1">${day}</div>`).join('')}
                    </div>
                    <div class="grid grid-cols-7 gap-1">
                        ${calendarDays.map((day, idx) => {
                            if (day === null) {
                                return `<div class="h-10"></div>`;
                            }
                            return `
                                <div class="text-center">
                                    <div class="calendar-day inline-flex items-center justify-center w-8 h-8 rounded-full ${day.isToday ? 'bg-blue-500 text-white' : day.hasQuiz ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-700'}">
                                        ${day.day}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div class="flex justify-center gap-4 mt-4 text-xs">
                        <div class="flex items-center gap-1">
                            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                            <span>Sınav Yapılan Gün</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
                            <span>Bugün</span>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderEditModal = () => {
            if (!state.showEditModal || !state.editingWord) return '';
            
            return `
                <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 edit-modal" onclick="window.closeEditModal(event)">
                    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full max-h-screen overflow-y-auto" onclick="event.stopPropagation()">
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-xl">✏️ Kelime Düzenle</h3>
                                <button onclick="window.closeEditModal()" class="text-gray-500 text-2xl">✕</button>
                            </div>
                            
                            <input type="text" id="editTerm" placeholder="Kelime" value="${state.editingWord.term.replace(/"/g, '&quot;')}"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            
                            <input type="text" id="editDefinition" placeholder="Anlamı" value="${state.editingWord.definition.replace(/"/g, '&quot;')}"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            
                            <input type="text" id="editImage" placeholder="Görsel URL" value="${state.editingWord.image || ''}"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            
                            <textarea id="editSynonyms" placeholder="Eş Anlamlılar" rows="2"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">${state.editingWord.synonyms || ''}</textarea>
                            
                            <input type="text" id="editAntonyms" placeholder="Zıt Anlamlılar" value="${state.editingWord.antonyms || ''}"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            
                            <textarea id="editExample" placeholder="Örnek Cümle" rows="2"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">${state.editingWord.exampleSentence || ''}</textarea>
                            
                            <div class="flex gap-3">
                                <button onclick="window.saveEdit()"
                                    class="flex-1 bg-gradient-to-r from-green-500 to-blue-600 text-white py-3 rounded-lg font-bold">
                                    💾 Kaydet
                                </button>
                                <button onclick="window.closeEditModal()"
                                    class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold">
                                    İptal
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        // Render Functions
        const renderHomeTab = () => {
            const dueCount = getDueWords().length;
            const levelStats = getLevelStats();
            const totalWords = state.words.filter(w => w.level !== 6).length;
            const masteredWords = state.words.filter(w => w.level === 6).length;
            
            return `
                <div class="p-4 space-y-6 animate-slide-up pb-20">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                            <div class="text-3xl mb-3">⏰</div>
                            <div class="text-3xl font-bold text-blue-600">${dueCount}</div>
                            <div class="text-gray-600 mt-1 text-sm">Bekleyen Kelime</div>
                        </div>
                        <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                            <div class="text-3xl mb-3">⭐</div>

            if (state.editingWord) {
                state.editingWord.term = termInput.value;
                state.editingWord.definition = defInput.value;
                state.editingWord.image = imageInput.value;
                state.editingWord.synonyms = synonymsInput.value;
                state.editingWord.antonyms = antonymsInput.value;
                state.editingWord.exampleSentence = exampleInput.value;
                updateWord();
            }
        };
        window.exportData = exportData;
        window.importData = (input) => importData({ target: input });
        window.setBackgroundColor = (color) => { state.backgroundColor = color; saveToLocalStorage(); render(); };
        window.changeSortType = (type) => { state.sortType = type; render(); };
        window.speakText = speakText;
        window.saveQuizHours = () => {
            const startHour = parseInt(document.getElementById('startHour').value);
            const endHour = parseInt(document.getElementById('endHour').value);
            if (!isNaN(startHour) && !isNaN(endHour) && startHour >= 0 && startHour <= 23 && endHour >= 0 && endHour <= 23) {
                state.quizStartHour = startHour;
                state.quizEndHour = endHour;
                saveToLocalStorage();
                alert('Saat ayarları kaydedildi!');
                render();
            } else {
                alert('Lütfen geçerli saat girin (0-23)');
            }
        };
        
        // Sync input values for add form
        window.syncInputs = () => {
            const termInput = document.getElementById('newTerm');
            const defInput = document.getElementById('newDefinition');
            const imageInput = document.getElementById('newImage');
            const synonymsInput = document.getElementById('newSynonyms');
            const antonymsInput = document.getElementById('newAntonyms');
            const exampleInput = document.getElementById('newExample');
            
            if (termInput) state.newWord.term = termInput.value;
            if (defInput) state.newWord.definition = defInput.value;
            if (imageInput) state.newWord.image = imageInput.value;
            if (synonymsInput) state.newWord.synonyms = synonymsInput.value;
            if (antonymsInput) state.newWord.antonyms = antonymsInput.value;
            if (exampleInput) state.newWord.exampleSentence = exampleInput.value;
        };
        
        // Sync writing answer
        window.syncWritingAnswer = () => {
            const answerInput = document.getElementById('writingAnswer');
            if (answerInput) state.writingAnswer = answerInput.value;
        };
        
        // Set interval to sync inputs
        setInterval(() => {
            if (state.showAddForm) {
                window.syncInputs();
            }
            if (state.showQuiz && state.quizType === 'writing') {
                window.syncWritingAnswer();
            }
        }, 100);
        
        const render = () => {
            document.getElementById('app').innerHTML = renderMain() + renderEditModal();
        };
        
        // Initialize
        loadFromLocalStorage();
        render();
    </script>
</body>
</html>
