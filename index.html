<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SRS Kelime Ezberleme - Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fireAnimation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        .animate-scale-in {
            animation: scaleIn 0.3s ease-out;
        }

        .animate-fire {
            animation: fireAnimation 0.5s ease-in-out;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        button:active {
            transform: scale(0.97);
        }

        .calendar-day {
            transition: all 0.2s ease;
        }

        .calendar-day:active {
            transform: scale(0.95);
        }

        .speak-btn {
            transition: all 0.2s ease;
        }

        .speak-btn:active {
            transform: scale(0.9);
        }

        .word-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .word-card:active {
            transform: scale(0.98);
        }

        .modal-overlay {
            backdrop-filter: blur(8px);
        }

        .progress-ring {
            transition: stroke-dashoffset 0.5s ease;
        }

        /* Dark theme styles */
        .dark-theme {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .dark-theme .bg-white,
        .dark-theme .bg-white\/90,
        .dark-theme .bg-white\/80 {
            background-color: rgba(30, 30, 46, 0.95) !important;
            color: #e0e0e0 !important;
        }

        .dark-theme .text-gray-800,
        .dark-theme .text-gray-700,
        .dark-theme .text-gray-600 {
            color: #e0e0e0 !important;
        }

        .dark-theme .text-gray-500,
        .dark-theme .text-gray-400 {
            color: #9ca3af !important;
        }

        .dark-theme .border-gray-100,
        .dark-theme .border-gray-200 {
            border-color: #2d2d44 !important;
        }

        .dark-theme .bg-gray-50,
        .dark-theme .bg-gray-100 {
            background-color: #2d2d44 !important;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #3B82F6;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        /* Search bar animation */
        .search-input {
            transition: all 0.3s ease;
        }

        .search-input:focus {
            transform: scale(1.02);
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="app"></div>

    <script>
        // Level Configuration
        const LEVEL_CONFIG = {
            1: { interval: 24, requiredStreak: 5, nextLevel: 2, fallbackLevel: 1, name: 'Başlangıç', color: '#3B82F6', bg: 'bg-blue-500', light: 'bg-blue-100' },
            2: { interval: 48, requiredStreak: 3, nextLevel: 3, fallbackLevel: 1, name: 'Orta Başlangıç', color: '#10B981', bg: 'bg-green-500', light: 'bg-green-100' },
            3: { interval: 120, requiredStreak: 3, nextLevel: 4, fallbackLevel: 2, name: 'Orta', color: '#F59E0B', bg: 'bg-yellow-500', light: 'bg-yellow-100' },
            4: { interval: 240, requiredStreak: 2, nextLevel: 5, fallbackLevel: 3, name: 'İleri', color: '#F97316', bg: 'bg-orange-500', light: 'bg-orange-100' },
            5: { interval: 360, requiredStreak: 2, nextLevel: 6, fallbackLevel: 4, name: 'Uzman', color: '#EF4444', bg: 'bg-red-500', light: 'bg-red-100' },
            6: { interval: 0, requiredStreak: 0, nextLevel: 6, fallbackLevel: 5, name: 'Ezberlendi', color: '#8B5CF6', bg: 'bg-purple-500', light: 'bg-purple-100' }
        };

        // Available card field types
        const CARD_FIELD_TYPES = [
            { id: 'showSynonyms', label: 'Eş Anlamlılar', icon: '📖', default: true },
            { id: 'showAntonyms', label: 'Zıt Anlamlılar', icon: '⚡', default: true },
            { id: 'showExampleSentence', label: 'Örnek Cümle', icon: '💬', default: true },
            { id: 'showImage', label: 'Görsel', icon: '🖼️', default: true },
            { id: 'showLevelBadge', label: 'Seviye Rozeti', icon: '🏷️', default: true },
            { id: 'showKademe', label: 'Kademe', icon: '📊', default: true },
            { id: 'showNextReview', label: 'Sonraki Tekrar', icon: '📅', default: true },
            { id: 'showSpeakButtons', label: 'Seslendirme Butonları', icon: '🔊', default: true }
        ];

        // Default card field visibility settings
        const DEFAULT_CARD_FIELDS = {
            showSynonyms: true,
            showAntonyms: true,
            showExampleSentence: true,
            showImage: true,
            showLevelBadge: true,
            showKademe: true,
            showNextReview: true,
            showSpeakButtons: true
        };

        // Initial demo words
        const INITIAL_WORDS = [
            { 
                id: '1', term: 'Apple', definition: 'Elma', level: 1, kademe: 0, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=300', synonyms: 'Elma', antonyms: '', exampleSentence: 'I eat an apple every day.'
            },
            { 
                id: '2', term: 'Car', definition: 'Araba', level: 2, kademe: 1, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=300', synonyms: 'Vehicle, Automobile', antonyms: '', exampleSentence: 'My car is red.'
            },
            { 
                id: '3', term: 'Beautiful', definition: 'Güzel', level: 3, kademe: 2, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=300', synonyms: 'Pretty, Lovely, Attractive', antonyms: 'Ugly', exampleSentence: 'The sunset is beautiful.'
            },
            { 
                id: '4', term: 'Fast', definition: 'Hızlı', level: 1, kademe: 2, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=300', synonyms: 'Quick, Rapid, Swift', antonyms: 'Slow', exampleSentence: 'He runs very fast.'
            },
            { 
                id: '5', term: 'Computer', definition: 'Bilgisayar', level: 2, kademe: 0, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=300', synonyms: 'PC, Laptop', antonyms: '', exampleSentence: 'I work on my computer.'
            },
            { 
                id: '6', term: 'Happy', definition: 'Mutlu', level: 1, kademe: 3, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300', synonyms: 'Joyful, Glad', antonyms: 'Sad', exampleSentence: 'She is very happy today.'
            },
            { 
                id: '7', term: 'Big', definition: 'Büyük', level: 2, kademe: 1, nextReview: Date.now(), finishTime: null,
                image: 'https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=300', synonyms: 'Large, Huge', antonyms: 'Small', exampleSentence: 'This is a big house.'
            }
        ];

        // App State
        let state = {
            words: [],
            activeTab: 'home',
            showQuiz: false,
            quizType: 'multiple-choice',
            currentQuestion: null,
            quizWords: [],
            quizIndex: 0,
            feedback: null,
            theme: 'light',
            quizStartHour: 0,
            quizEndHour: 23,
            showAddForm: false,
            showEditModal: false,
            showDetailModal: false,
            showCardSettings: false,
            detailWord: null,
            editingWord: null,
            newWord: {
                term: '',
                definition: '',
                image: '',
                synonyms: '',
                antonyms: '',
                exampleSentence: ''
            },
            sortType: 'newest',
            quizHistory: [],
            writingAnswer: '',
            streakDays: 0,
            totalPoints: 0,
            cardFields: { ...DEFAULT_CARD_FIELDS },
            searchQuery: ''
        };

        // Helper Functions
        const saveToLocalStorage = () => {
            localStorage.setItem('srs_words', JSON.stringify(state.words));
            localStorage.setItem('srs_theme', state.theme);
            localStorage.setItem('quiz_start_hour', state.quizStartHour);
            localStorage.setItem('quiz_end_hour', state.quizEndHour);
            localStorage.setItem('quiz_history', JSON.stringify(state.quizHistory));
            localStorage.setItem('streak_days', state.streakDays);
            localStorage.setItem('total_points', state.totalPoints);
            localStorage.setItem('card_fields', JSON.stringify(state.cardFields));
        };

        const loadFromLocalStorage = () => {
            const savedWords = localStorage.getItem('srs_words');
            state.words = savedWords ? JSON.parse(savedWords) : JSON.parse(JSON.stringify(INITIAL_WORDS));
            state.theme = localStorage.getItem('srs_theme') || 'light';
            state.quizStartHour = parseInt(localStorage.getItem('quiz_start_hour')) || 0;
            state.quizEndHour = parseInt(localStorage.getItem('quiz_end_hour')) || 23;
            const savedHistory = localStorage.getItem('quiz_history');
            state.quizHistory = savedHistory ? JSON.parse(savedHistory) : [];
            state.streakDays = parseInt(localStorage.getItem('streak_days')) || 0;
            state.totalPoints = parseInt(localStorage.getItem('total_points')) || 0;
            const savedCardFields = localStorage.getItem('card_fields');
            state.cardFields = savedCardFields ? JSON.parse(savedCardFields) : { ...DEFAULT_CARD_FIELDS };
            updateStreakAndPoints();
        };

        const updateStreakAndPoints = () => {
            const today = new Date().toDateString();
            const lastQuizDate = state.quizHistory.length > 0 ? new Date(state.quizHistory[state.quizHistory.length - 1]) : null;
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (lastQuizDate) {
                const lastDateStr = lastQuizDate.toDateString();
                const todayStr = new Date().toDateString();
                
                if (lastDateStr === todayStr) {
                } else if (lastDateStr === yesterday.toDateString()) {
                    state.streakDays++;
                } else {
                    state.streakDays = 1;
                }
            }
            
            saveToLocalStorage();
        };

        const addPoints = (points) => {
            state.totalPoints += points;
            saveToLocalStorage();
            render();
            
            const pointElement = document.getElementById('points-display');
            if (pointElement) {
                pointElement.classList.add('animate-fire');
                setTimeout(() => {
                    if (pointElement) pointElement.classList.remove('animate-fire');
                }, 500);
            }
        };

        const getDueWords = () => {
            const now = Date.now();
            const currentHour = new Date().getHours();
            return state.words.filter(word => {
                if (word.level === 6) return false;
                const isInTimeRange = currentHour >= state.quizStartHour && currentHour <= state.quizEndHour;
                if (!isInTimeRange) return false;
                return word.nextReview <= now;
            });
        };

        const updateWordAfterAnswer = (word, isCorrect) => {
            if (isCorrect) {
                const newKademe = word.kademe + 1;
                const config = LEVEL_CONFIG[word.level];
                
                addPoints(10);
                
                if (newKademe >= config.requiredStreak) {
                    const nextLevel = config.nextLevel;
                    addPoints(50);
                    if (nextLevel === 6) {
                        return {
                            ...word,
                            level: 6,
                            kademe: 0,
                            nextReview: Date.now(),
                            finishTime: Date.now()
                        };
                    } else {
                        return {
                            ...word,
                            level: nextLevel,
                            kademe: 0,
                            nextReview: Date.now() + (LEVEL_CONFIG[nextLevel].interval * 60 * 60 * 1000)
                        };
                    }
                } else {
                    return {
                        ...word,
                        kademe: newKademe,
                        nextReview: Date.now() + (config.interval * 60 * 60 * 1000)
                    };
                }
            } else {
                if (word.level === 1) {
                    return {
                        ...word,
                        kademe: 0,
                        nextReview: Date.now() + (LEVEL_CONFIG[1].interval * 60 * 60 * 1000)
                    };
                } else {
                    const fallbackLevel = LEVEL_CONFIG[word.level].fallbackLevel;
                    return {
                        ...word,
                        level: fallbackLevel,
                        kademe: 0,
                        nextReview: Date.now() + (LEVEL_CONFIG[fallbackLevel].interval * 60 * 60 * 1000)
                    };
                }
            }
        };

        const speakText = (text, lang = 'en') => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.9;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            } else {
                alert('Seslendirme desteklenmiyor');
            }
        };

        const generateDistractors = (correctWord) => {
            const otherWords = state.words.filter(w => 
                w.id !== correctWord.id && 
                w.definition !== correctWord.definition &&
                w.level !== 6
            );
            
            const shuffled = [...otherWords].sort(() => Math.random() - 0.5);
            const distractors = shuffled.slice(0, 3).map(w => w.definition);
            
            while (distractors.length < 3) {
                distractors.push(`Anlam ${distractors.length + 1}`);
            }
            
            return distractors;
        };

        const generateQuestion = (wordsList, index) => {
            if (index >= wordsList.length) {
                if (state.quizType === 'multiple-choice') {
                    state.quizType = 'writing';
                    state.quizIndex = 0;
                    generateWritingQuestion(wordsList, 0);
                } else {
                    finishQuiz();
                }
                return;
            }
            
            const currentWord = wordsList[index];
            const distractors = generateDistractors(currentWord);
            const options = [...distractors, currentWord.definition];
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            
            state.currentQuestion = {
                word: currentWord,
                options: shuffledOptions,
                correctAnswer: currentWord.definition,
                type: 'multiple-choice'
            };
            render();
        };

        const generateWritingQuestion = (wordsList, index) => {
            if (index >= wordsList.length) {
                finishQuiz();
                return;
            }
            
            const currentWord = wordsList[index];
            state.currentQuestion = {
                word: currentWord,
                correctAnswer: currentWord.term,
                type: 'writing'
            };
            state.writingAnswer = '';
            render();
        };

        const handleMultipleChoiceAnswer = (selectedAnswer) => {
            if (!state.currentQuestion) return;
            
            const isCorrect = selectedAnswer === state.currentQuestion.correctAnswer;
            
            state.feedback = {
                isCorrect,
                correctAnswer: state.currentQuestion.correctAnswer
            };
            
            const updatedWord = updateWordAfterAnswer(state.currentQuestion.word, isCorrect);
            const wordIndex = state.words.findIndex(w => w.id === updatedWord.id);
            if (wordIndex !== -1) {
                state.words[wordIndex] = updatedWord;
            }
            
            saveToLocalStorage();
            
            setTimeout(() => {
                state.feedback = null;
                const nextIndex = state.quizIndex + 1;
                if (nextIndex < state.quizWords.length) {
                    state.quizIndex = nextIndex;
                    generateQuestion(state.quizWords, nextIndex);
                } else {
                    if (state.quizType === 'multiple-choice') {
                        state.quizType = 'writing';
                        state.quizIndex = 0;
                        generateWritingQuestion(state.quizWords, 0);
                    } else {
                        finishQuiz();
                    }
                }
                render();
            }, 1500);
            
            render();
        };

        const handleWritingAnswer = () => {
            if (!state.currentQuestion || !state.writingAnswer.trim()) {
                alert('Lütfen bir cevap yazın!');
                return;
            }
            
            const isCorrect = state.writingAnswer.trim().toLowerCase() === state.currentQuestion.correctAnswer.toLowerCase();
            
            state.feedback = {
                isCorrect,
                correctAnswer: state.currentQuestion.correctAnswer
            };
            
            const updatedWord = updateWordAfterAnswer(state.currentQuestion.word, isCorrect);
            const wordIndex = state.words.findIndex(w => w.id === updatedWord.id);
            if (wordIndex !== -1) {
                state.words[wordIndex] = updatedWord;
            }
            
            if (state.quizIndex === state.quizWords.length - 1 && state.quizType === 'writing') {
                const today = new Date().toDateString();
                if (!state.quizHistory.includes(today)) {
                    state.quizHistory.push(today);
                    updateStreakAndPoints();
                    addPoints(100);
                    saveToLocalStorage();
                }
            }
            
            saveToLocalStorage();
            
            setTimeout(() => {
                state.feedback = null;
                const nextIndex = state.quizIndex + 1;
                if (nextIndex < state.quizWords.length) {
                    state.quizIndex = nextIndex;
                    generateWritingQuestion(state.quizWords, nextIndex);
                } else {
                    finishQuiz();
                }
                render();
            }, 1500);
            
            render();
        };

        const startQuiz = () => {
            const due = getDueWords();
            if (due.length < 5) {
                alert('Sınav başlatmak için en az 5 kelimeye ihtiyacınız var!');
                return;
            }
            
            state.quizWords = [...due];
            state.quizIndex = 0;
            state.quizType = 'multiple-choice';
            state.showQuiz = true;
            generateQuestion(state.quizWords, 0);
        };

        const finishQuiz = () => {
            state.showQuiz = false;
            state.currentQuestion = null;
            state.quizWords = [];
            state.quizIndex = 0;
            state.feedback = null;
            state.quizType = 'multiple-choice';
            state.writingAnswer = '';
            render();
        };

        const addWord = () => {
            if (!state.newWord.term.trim() || !state.newWord.definition.trim()) {
                alert('Lütfen kelime ve anlamını girin!');
                return;
            }
            
            const newWord = {
                id: Date.now().toString(),
                term: state.newWord.term.trim(),
                definition: state.newWord.definition.trim(),
                level: 1,
                kademe: 0,
                nextReview: Date.now(),
                finishTime: null,
                image: state.newWord.image.trim(),
                synonyms: state.newWord.synonyms.trim(),
                antonyms: state.newWord.antonyms.trim(),
                exampleSentence: state.newWord.exampleSentence.trim()
            };
            
            state.words.unshift(newWord);
            state.newWord = {
                term: '',
                definition: '',
                image: '',
                synonyms: '',
                antonyms: '',
                exampleSentence: ''
            };
            state.showAddForm = false;
            saveToLocalStorage();
            render();
        };

        const updateWord = () => {
            if (!state.editingWord) return;
            
            const index = state.words.findIndex(w => w.id === state.editingWord.id);
            if (index !== -1) {
                state.words[index] = { ...state.editingWord };
                saveToLocalStorage();
            }
            
            state.showEditModal = false;
            state.editingWord = null;
            render();
        };

        const deleteWord = (id) => {
            if (confirm('Bu kelimeyi silmek istediğinizden emin misiniz?')) {
                state.words = state.words.filter(w => w.id !== id);
                saveToLocalStorage();
                render();
            }
        };

        const openEditModal = (word) => {
            state.editingWord = { ...word };
            state.showEditModal = true;
            render();
        };

        const openDetailModal = (word) => {
            state.detailWord = { ...word };
            state.showDetailModal = true;
            render();
        };

        const toggleCardField = (fieldId) => {
            state.cardFields[fieldId] = !state.cardFields[fieldId];
            saveToLocalStorage();
            render();
        };

        const resetCardFields = () => {
            state.cardFields = { ...DEFAULT_CARD_FIELDS };
            saveToLocalStorage();
            render();
        };

        const exportData = () => {
            const dataStr = JSON.stringify(state.words, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `srs_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        };

        const importData = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (Array.isArray(imported)) {
                            state.words = imported;
                            saveToLocalStorage();
                            alert('Veriler başarıyla yüklendi!');
                            render();
                        } else {
                            alert('Geçersiz dosya formatı!');
                        }
                    } catch (err) {
                        alert('Dosya okunamadı!');
                    }
                };
                reader.readAsText(file);
            }
        };

        const getFilteredAndSortedWords = () => {
            let filtered = [...state.words];
            
            // Apply search filter
            if (state.searchQuery.trim()) {
                const query = state.searchQuery.toLowerCase().trim();
                filtered = filtered.filter(word => 
                    word.term.toLowerCase().includes(query) || 
                    word.definition.toLowerCase().includes(query)
                );
            }
            
            // Apply sort
            switch(state.sortType) {
                case 'newest':
                    return filtered.sort((a, b) => parseInt(b.id) - parseInt(a.id));
                case 'oldest':
                    return filtered.sort((a, b) => parseInt(a.id) - parseInt(b.id));
                case 'levelAsc':
                    return filtered.sort((a, b) => a.level - b.level);
                case 'levelDesc':
                    return filtered.sort((a, b) => b.level - a.level);
                default:
                    return filtered;
            }
        };

        const getLevelStats = () => {
            const stats = {};
            for (let i = 1; i <= 6; i++) {
                stats[i] = state.words.filter(w => w.level === i).length;
            }
            return stats;
        };

        const getNextReviewDate = (timestamp) => {

                case 'add': content = renderAddTab(); break;
                case 'list': content = renderListTab(); break;
                case 'settings': content = renderSettingsTab(); break;
                default: content = renderHomeTab();
            }
            
            const themeClass = state.theme === 'dark' ? 'dark-theme' : '';
            const bgGradient = state.theme === 'dark' ? '' : 'bg-gradient-to-br from-gray-50 to-gray-100';
            
            return `
                <div class="min-h-screen ${bgGradient} ${themeClass} pb-16">
                    <div class="container mx-auto max-w-md">
                        ${content}
                    </div>
                    
                    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg shadow-2xl border-t border-gray-100 pb-safe ${state.theme === 'dark' ? 'dark-theme' : ''}">
                        <div class="container mx-auto max-w-md">
                            <div class="flex justify-around py-2">
                                ${[
                                    { id: 'home', icon: '🏠', label: 'Ana Sayfa' },
                                    { id: 'add', icon: '➕', label: 'Ekle' },
                                    { id: 'list', icon: '📋', label: 'Listem' },
                                    { id: 'settings', icon: '⚙️', label: 'Ayarlar' }
                                ].map(tab => `
                                    <button onclick="window.switchTab('${tab.id}')" 
                                        class="flex flex-col items-center py-2 px-5 rounded-2xl transition-all ${state.activeTab === tab.id ? 'text-blue-600 bg-blue-50' : 'text-gray-500'}">
                                        <div class="text-2xl">${tab.icon}</div>
                                        <span class="text-xs mt-1 font-medium">${tab.label}</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </nav>
                </div>
            `;
        };

        // Global functions
        window.startQuiz = startQuiz;
        window.finishQuiz = finishQuiz;
        window.handleMultipleChoiceAnswer = handleMultipleChoiceAnswer;
        window.handleWritingAnswer = handleWritingAnswer;
        window.switchTab = (tab) => { state.activeTab = tab; render(); };
        window.toggleAddForm = (show) => { state.showAddForm = show; render(); };
        window.addWord = addWord;
        window.deleteWord = deleteWord;
        window.openEditModal = (word) => { openEditModal(word); };
        window.openDetailModal = (word) => { openDetailModal(word); };
        window.closeDetailModal = (event) => { 
            if (!event || event.target === event.currentTarget) {
                state.showDetailModal = false;
                state.detailWord = null;
                render();
            }
        };
        window.openEditModalFromDetail = () => {
            if (state.detailWord) {
                state.showDetailModal = false;
                openEditModal(state.detailWord);
            }
        };
        window.deleteWordFromDetail = () => {
            if (state.detailWord) {
                const id = state.detailWord.id;
                state.showDetailModal = false;
                deleteWord(id);
            }
        };
        window.closeEditModal = (event) => { 
            if (!event || event.target === event.currentTarget) {
                state.showEditModal = false;
                state.editingWord = null;
                render();
            }
        };
        window.saveEdit = () => {
            const termInput = document.getElementById('editTerm');
            const defInput = document.getElementById('editDefinition');
            const imageInput = document.getElementById('editImage');
            const synonymsInput = document.getElementById('editSynonyms');
            const antonymsInput = document.getElementById('editAntonyms');
            const exampleInput = document.getElementById('editExample');
            
            if (state.editingWord) {
                state.editingWord.term = termInput?.value || '';
                state.editingWord.definition = defInput?.value || '';
                state.editingWord.image = imageInput?.value || '';
                state.editingWord.synonyms = synonymsInput?.value || '';
                state.editingWord.antonyms = antonymsInput?.value || '';
                state.editingWord.exampleSentence = exampleInput?.value || '';
                updateWord();
            }
        };
        window.exportData = exportData;
        window.importData = (input) => importData({ target: input });
        window.setTheme = (theme) => { 
            state.theme = theme; 
            saveToLocalStorage(); 
            render();
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
            }
        };
        window.changeSortType = (type) => { state.sortType = type; render(); };
        window.speakText = speakText;
        window.toggleCardField = toggleCardField;
        window.resetCardFields = resetCardFields;
        window.searchWords = (query) => { 
            state.searchQuery = query; 
            render(); 
        };
        window.clearSearch = () => { 
            state.searchQuery = ''; 
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = '';
            render(); 
        };
        window.saveQuizHours = () => {
            const startHour = parseInt(document.getElementById('startHour')?.value);
            const endHour = parseInt(document.getElementById('endHour')?.value);
            if (!isNaN(startHour) && !isNaN(endHour) && startHour >= 0 && startHour <= 23 && endHour >= 0 && endHour <= 23) {
                state.quizStartHour = startHour;
                state.quizEndHour = endHour;
                saveToLocalStorage();
                alert('Saat ayarları kaydedildi!');
                render();
            } else {
                alert('Lütfen geçerli saat girin (0-23)');
            }
        };
        
        // Sync input values
        window.syncInputs = () => {
            const termInput = document.getElementById('newTerm');
            const defInput = document.getElementById('newDefinition');
            const imageInput = document.getElementById('newImage');
            const synonymsInput = document.getElementById('newSynonyms');
            const antonymsInput = document.getElementById('newAntonyms');
            const exampleInput = document.getElementById('newExample');
            
            if (termInput) state.newWord.term = termInput.value;
            if (defInput) state.newWord.definition = defInput.value;
            if (imageInput) state.newWord.image = imageInput.value;
            if (synonymsInput) state.newWord.synonyms = synonymsInput.value;
            if (antonymsInput) state.newWord.antonyms = antonymsInput.value;
            if (exampleInput) state.newWord.exampleSentence = exampleInput.value;
        };
        
        window.syncWritingAnswer = () => {
            const answerInput = document.getElementById('writingAnswer');
            if (answerInput) state.writingAnswer = answerInput.value;
        };
        
        setInterval(() => {
            if (state.showAddForm) window.syncInputs();
            if (state.showQuiz && state.quizType === 'writing') window.syncWritingAnswer();
        }, 100);
        
        const render = () => {
            document.getElementById('app').innerHTML = renderMain() + renderEditModal() + renderDetailModal();
        };
        
        loadFromLocalStorage();
        if (state.theme === 'dark') {
            document.body.classList.add('dark-theme');
        }
        render();
    </script>
</body>
</html>
